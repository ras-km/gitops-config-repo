apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
 
bases:
  - ../../base   # Start from the base
 
# Override for staging environment
namespace: hello-world-staging
 
commonLabels:
  environment: staging
 
# Change image tag for staging
images:
  - name: ghcr.io/ras-km/hello-world
    newTag: latest  # ArgoCD Image Updater will update this automatically
 
# Staging uses fewer replicas to save resources
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: hello-world
