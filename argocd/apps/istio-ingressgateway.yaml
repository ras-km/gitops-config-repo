apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingressgateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.23.0
    helm:
      values: |
        service:
          type: LoadBalancer
        labels:
          app: istio-ingressgateway
          istio: ingressgateway
        serviceAccount:
          name: istio-ingressgateway
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Service
      name: istio-ingressgateway
      jsonPointers:
        - /status/loadBalancer