apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.20.0
    helm:
      values: |
        service:
          type: LoadBalancer
        labels:
          app: istio-ingressgateway
          istio: ingressgateway
        podLabels:
          app: istio-ingressgateway
          istio: ingressgateway
        serviceAccount:
          name: istio-ingressgateway
        nameOverride: istio-ingressgateway
        fullnameOverride: istio-ingressgateway
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true