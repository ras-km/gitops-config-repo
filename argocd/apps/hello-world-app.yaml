apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: myimage=ghcr.io/ras-km/hello-world
    argocd-image-updater.argoproj.io/myimage.update-strategy: semver
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: https://github.com/ras-km/gitops-config-repo
    targetRevision: main
    path: apps/hello-world/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/template/metadata/annotations