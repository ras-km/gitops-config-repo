apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ras-km/gitops-config-repo
    targetRevision: main
    path: security/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true